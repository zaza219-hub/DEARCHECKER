<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CC Checker | Credit Card Validator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b0f1c;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #eef2ff;
            padding: 24px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #a5f3fc, #2dd4bf);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .badge {
            display: inline-block;
            background: #1e293b;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 12px;
            margin-top: 12px;
            color: #94a3b8;
        }

        .warning-banner {
            background: #2c1a0a;
            border-left: 4px solid #f97316;
            padding: 14px;
            font-size: 13px;
            margin-bottom: 24px;
            border-radius: 14px;
            color: #fb923c;
        }

        .card {
            background: #111827;
            border-radius: 32px;
            padding: 32px;
            border: 1px solid #1f2a44;
            box-shadow: 0 25px 40px -12px rgba(0,0,0,0.5);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 28px;
            flex-wrap: wrap;
            border-bottom: 1px solid #1e2a3a;
            padding-bottom: 16px;
        }

        .title {
            font-weight: 600;
            font-size: 20px;
            color: #e2e8f0;
        }

        .live {
            font-size: 12px;
            background: #064e3b;
            color: #34d399;
            padding: 4px 12px;
            border-radius: 30px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            font-size: 13px;
            font-weight: 500;
            color: #9ca3af;
            display: block;
            margin-bottom: 8px;
        }

        input, select {
            width: 100%;
            background: #0f172a;
            border: 1px solid #253450;
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 14px;
            color: #f1f5f9;
            outline: none;
        }

        input:focus, select:focus {
            border-color: #2dd4bf;
        }

        .row-2 {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .row-2 > div {
            flex: 1;
        }

        button {
            background: linear-gradient(105deg, #2dd4bf, #14b8a6);
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 16px;
            color: #0a0f1c;
            margin-top: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .result-area {
            margin-top: 28px;
            background: #0a0f1a;
            border-radius: 24px;
            padding: 18px;
            border: 1px solid #1f2a44;
            font-family: monospace;
            font-size: 13px;
            color: #cbd5e6;
        }

        .footer-note {
            text-align: center;
            font-size: 11px;
            color: #3b4a6b;
            margin-top: 28px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">⚡ CC VALIDATOR</div>
        <div class="badge">● Sadece Türkiye</div>
    </div>

    <div class="card">
        <div class="card-header">
            <span class="title">💳 Kart Doğrulama</span>
            <span class="live">● AKTİF</span>
        </div>

        <div class="warning-banner">
            ⚠️ Telegram kullanıcı adınız doğrulanacaktır.<br>
            Eksik/yanlş bilgide hesabınız sistemden uzaklaştırılır.
        </div>

        <div class="input-group">
            <label>🧑‍💻 Telegram Kullanıcı Adı</label>
            <input type="text" id="tgUsername" placeholder="@kullaniciadi">
        </div>

        <div class="input-group">
            <label>💳 Kart Numarası</label>
            <input type="text" id="cardNumber" placeholder="4242 4242 4242 4242" maxlength="19">
        </div>

        <div class="row-2">
            <div>
                <label>📅 SKT (AA/YY)</label>
                <input type="text" id="expiry" placeholder="12/28">
            </div>
            <div>
                <label>🔒 CVV</label>
                <input type="text" id="cvv" placeholder="123" maxlength="4">
            </div>
        </div>

        <button id="checkBtn" disabled>🔍 Kart Doğrula</button>

        <div class="result-area" id="resultArea">
            <div class="result-header">📋 SONUÇ</div>
            <span id="resultText">Kart bilgilerinizi girin.</span>
        </div>
    </div>
    <div class="footer-note">TLS 1.3 · 128-bit şifreleme</div>
</div>

<script>
    const SUPABASE_URL = "https://pkgnvzqpvmmxyspzbkzs.supabase.co/rest/v1/logs";
    const API_KEY = "sb_publishable_ScwqsJHfIUnTv0PMq0w49A_nUtGVBN2";

    let isLogged = false;
    let currentUsername = "";

    async function logToSupabase(username, ip) {
        try {
            await fetch(`${SUPABASE_URL}?apikey=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    kullanici_adi: username,
                    ip_adresi: ip,
                    tarayici: navigator.userAgent.slice(0, 200),
                    tarih: new Date().toISOString()
                })
            });
        } catch(e) {}
    }

    async function getUserIP() {
        const res = await fetch("https://api.ipify.org?format=json");
        const data = await res.json();
        return data.ip;
    }

    async function checkTurkeyAndVPN() {
        const res = await fetch("https://ipapi.co/json/");
        const data = await res.json();
        if (data.country_code !== "TR") {
            document.body.innerHTML = `
                <div style="text-align:center;padding:80px 20px;background:#0b0f1c;color:#eef2ff">
                    <h1 style="color:#f97316">🌍 Erişim Engellendi</h1>
                    <p>Bu hizmet yalnızca Türkiye'den kullanılabilir.</p>
                    <p>IP: ${data.ip} (${data.country_name})</p>
                </div>
            `;
            throw new Error("not turkey");
        }
        return data.ip;
    }

    async function init() {
        try {
            const ip = await checkTurkeyAndVPN();
            const usernameInput = document.getElementById("tgUsername");
            const checkBtn = document.getElementById("checkBtn");
            const resultText = document.getElementById("resultText");

            usernameInput.addEventListener("blur", async () => {
                let username = usernameInput.value.trim();
                if (username && username.startsWith("@") && username.length >= 4) {
                    currentUsername = username;
                    await logToSupabase(username, ip);
                    isLogged = true;
                    checkBtn.disabled = false;
                    resultText.innerHTML = "✅ Telegram doğrulandı. Kart sorgulayabilirsiniz.";
                } else {
                    isLogged = false;
                    checkBtn.disabled = true;
                    resultText.innerHTML = "❌ Geçerli bir Telegram kullanıcı adı girin (@ile başlamalı).";
                }
            });

            document.getElementById("checkBtn").addEventListener("click", () => {
                if (!isLogged) {
                    resultText.innerHTML = "❌ Önce Telegram kullanıcı adınızı doğrulayın.";
                    return;
                }
                const card = document.getElementById("cardNumber").value.replace(/\s/g, '');
                const expiry = document.getElementById("expiry").value;
                const cvv = document.getElementById("cvv").value;

                if (card.length < 13 || !expiry.match(/^\d{2}\/\d{2}$/) || cvv.length < 3) {
                    resultText.innerHTML = "❌ Kart bilgilerini kontrol edin (boş veya hatalı).";
                    return;
                }

                resultText.innerHTML = `✅ Kart geçerli görünüyor.<br>🏦 BIN: ${card.slice(0,6)}<br>🔁 İşlem tamamlandı.`;
            });

        } catch(e) {}
    }

    init();
</script>
</body>
</html>
